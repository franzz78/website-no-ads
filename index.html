<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiniTube - Pemutar Bebas Iklan</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

    <header class="header">
        <div class="header-left">
            <button class="icon-btn"><i class="fas fa-bars"></i></button>
            <div class="logo" onclick="location.reload()">
                <i class="fab fa-youtube logo-icon"></i>
                <span class="logo-text">MiniTube</span>
            </div>
        </div>

        <div class="header-center">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Telusuri Video MiniTube...">
                <button class="search-btn"><i class="fas fa-search"></i></button>
            </div>
            <button class="icon-btn mic-btn"><i class="fas fa-microphone"></i></button>
        </div>

        <div class="header-right">
            <button class="icon-btn"><i class="fas fa-video"></i></button>
            <button class="icon-btn"><i class="fas fa-bell"></i></button>
            
            <div id="google-login-wrapper">
                <div id="g_id_onload"
                     data-client_id="MOHON_GANTI_DENGAN_CLIENT_ID_KAMU.apps.googleusercontent.com"
                     data-context="signin"
                     data-ux_mode="popup"
                     data-callback="handleCredentialResponse"
                     data-auto_select="true">
                </div>
                <div class="g_id_signin" data-type="standard" data-shape="pill" data-theme="filled_blue" data-text="signin_with" data-size="large"></div>
            </div>

            <div id="user-profile" class="user-profile hidden">
                <img id="user-avatar" src="" alt="Avatar">
            </div>
        </div>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <div class="sidebar-group">
                <a href="#" class="sidebar-item active"><i class="fas fa-home"></i> <span>Beranda</span></a>
                <a href="#" class="sidebar-item"><i class="fab fa-youtube-square"></i> <span>Shorts</span></a>
                <a href="#" class="sidebar-item"><i class="fas fa-folder-open"></i> <span>Subskripsi</span></a>
            </div>
            <hr class="divider">
            <div class="sidebar-group">
                <a href="#" class="sidebar-item"><i class="fas fa-history"></i> <span>Histori</span></a>
                <a href="#" class="sidebar-item"><i class="fas fa-clock"></i> <span>Tonton Nanti</span></a>
                <a href="#" class="sidebar-item"><i class="fas fa-thumbs-up"></i> <span>Video Disukai</span></a>
            </div>
        </aside>

        <main class="content">
            
            <div class="player-section">
                <div class="video-wrapper">
                    <iframe id="main-youtube-player" 
                            src="https://www.youtube.com/embed/jfKfPfyJRdk?rel=0&autoplay=0&modestbranding=1" 
                            title="YouTube video player" 
                            frameborder="0" 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                            allowfullscreen>
                    </iframe>
                </div>
                <h2 id="playing-title" class="playing-title">Selamat Datang di MiniTube - Pemutar Video YouTube Bebas Iklan</h2>
                <p id="playing-channel" class="playing-channel">Silakan pilih atau cari video di bawah untuk mulai memutar</p>
                <hr class="divider">
            </div>

            <div class="tags-container">
                <span class="tag active">Musik Indonesia</span>
                <span class="tag">Live Streaming</span>
                <span class="tag">Gaming</span>
                <span class="tag">Edukasi Web</span>
                <span class="tag">Lo-Fi Beats</span>
            </div>

            <div class="video-grid">
                </div>
        </main>
    </div>

    <script>
        // Fungsi mengganti video di player utama
        function playVideo(videoId, title, channel) {
            const player = document.getElementById('main-youtube-player');
            player.src = `https://www.youtube.com/embed/${videoId}?rel=0&autoplay=1&modestbranding=1`;
            
            document.getElementById('playing-title').innerText = title;
            document.getElementById('playing-channel').innerText = channel;
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Handler Google Login
        function handleCredentialResponse(response) {
            const responsePayload = parseJwt(response.credential);
            document.getElementById("google-login-wrapper").classList.add("hidden");
            const avatar = document.getElementById("user-avatar");
            avatar.src = responsePayload.picture;
            document.getElementById("user-profile").classList.remove("hidden");
        }

        function parseJwt (token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }
    </script>

    <script src="script.js"></script>
</body>
</html>
