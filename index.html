<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CleanPlayer - Premium No Ads Streamer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="CleanPlayer">
    <link class="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1384/1384060.png">
</head>
<body>

    <div class="container" id="playerContainer">
        <header>
            <h1>CleanPlayer <span>PRO</span></h1>
            <p class="subtitle">Streaming musik & video tanpa gangguan iklan</p>
        </header>
        
        <div class="input-group">
            <input type="text" id="videoUrl" placeholder="Tempel link YouTube atau ID video di sini...">
            <button id="playBtn">Putar</button>
        </div>

        <div class="video-wrapper">
            <div id="player"></div>
        </div>

        <div class="options">
            <button class="btn-secondary" id="musicModeBtn">Mode Musik Saja</button>
        </div>

        <div class="lyrics-section">
            <div class="lyrics-header">
                <h3>Lirik Lagu</h3>
                <button id="editLyricsBtn" class="btn-small">Edit Lirik</button>
            </div>
            <div class="lyrics-body">
                <div id="lyricsText" class="lyrics-content">Belum ada lirik untuk lagu ini. Klik Edit Lirik untuk menambahkan teks lirik kamu sendiri.</div>
                <textarea id="lyricsInput" class="lyrics-textarea" style="display: none;" placeholder="Tulis atau tempel lirik lagu di sini..."></textarea>
            </div>
        </div>

        <button id="installAppBtn" style="display: none; margin: 20px auto 0 auto; background: #10b981; padding: 10px 20px; font-size: 0.85rem;">Install Aplikasi CleanPlayer</button>

        <div class="history-section">
            <div class="history-header">
                <h3>Riwayat Putar Terakhir</h3>
                <span class="db-badge">Realtime DB</span>
            </div>
            <ul class="history-list" id="historyList">
                <li class="loading-state">Menghubungkan ke database aman...</li>
            </ul>
        </div>
    </div>

    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        window.currentVideoId = 'dQw4w9WgXcQ'; // Lagu default awal

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '100%',
                width: '100%',
                videoId: window.currentVideoId,
                playerVars: {
                    'playsinline': 1,
                    'rel': 0,
                    'modestbranding': 1,
                    'controls': 1,
                    'autoplay': 0
                }
            });
        }

        // Registrasi Service Worker asli untuk fitur PWA (Installable)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('Service Worker terdaftar!', reg))
                .catch(err => console.log('Service Worker gagal:', err));
            });
        }
    </script>

    <script type="module" src="script.js"></script>
</body>
</html>
