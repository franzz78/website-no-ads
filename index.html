<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MiniTube X V4.1 - Edisi Nusantara</title>

    <!-- SEO & Web Verification Meta Tags -->
    <meta name="description" content="MiniTube X V4.1 - Platform Streaming Video Modern, Bebas Iklan, dan PWA Ready dengan Tema Nusantara Merah Putih.">
    <meta name="keywords" content="MiniTube X, Youtube Player, Ad-free Video, Web App Nusantara, Merah Putih UI">
    <meta name="author" content="MiniTube X Team">
    <meta name="theme-color" content="#ff003c">
    <meta name="google-site-verification" content="9FgPszYe0eP2kBEzJ0wdNVbPASR5mDb1S51DApXHbkc" />

    <!-- Favicon & PWA App Icons -->
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/about-blank/assets/main/logo.png">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/about-blank/assets/main/logo.png">
    <link rel="manifest" href="manifest.json">

    <!-- Fonts & Icons CDN -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            red: '#ff003c',
                            crimson: '#d6002f',
                            gold: '#ffd700',
                            dark: '#0d0607',
                            card: 'rgba(255, 255, 255, 0.04)'
                        }
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0d0607] text-white min-h-screen font-sans antialiased selection:bg-[#ff003c] selection:text-white relative overflow-x-hidden">

    <!-- Background Ambient Glow -->
    <div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
        <div class="absolute -top-40 -left-40 w-96 h-96 bg-red-600/15 rounded-full blur-[120px]"></div>
        <div class="absolute top-1/2 right-0 w-80 h-80 bg-white/5 rounded-full blur-[100px]"></div>
        <div class="absolute -bottom-20 left-1/3 w-96 h-96 bg-red-900/10 rounded-full blur-[140px]"></div>
    </div>

    <!-- Network Status Banner -->
    <div id="network-status-banner" class="hidden"></div>

    <!-- Top Navigation Bar -->
    <header class="sticky top-0 z-50 backdrop-blur-xl bg-[#0d0607]/90 border-b border-red-500/20 px-4 lg:px-8 py-3 transition-all duration-300">
        <div class="max-w-7xl mx-auto flex items-center justify-between gap-4">
            
            <!-- Brand Logo & Title -->
            <div class="flex items-center gap-3 cursor-pointer" onclick="location.reload()">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-red-600 to-red-500 flex items-center justify-center shadow-[0_0_18px_rgba(255,0,60,0.4)] border border-red-400/30 transform hover:scale-105 transition-transform">
                    <i class="fas fa-play text-white text-sm"></i>
                </div>
                <div>
                    <h1 class="text-lg font-extrabold tracking-wider text-white flex items-center gap-1.5 leading-none">
                        MINITUBE <span class="text-[#ff003c] drop-shadow-[0_0_10px_rgba(255,0,60,0.8)]">X</span>
                    </h1>
                    <span class="text-[9px] tracking-[0.2em] text-red-400/90 font-mono block mt-1 font-bold">EDISI NUSANTARA v4.1</span>
                </div>
            </div>

            <!-- Integrated Search Bar -->
            <div class="flex-1 max-w-xl mx-2 hidden sm:block">
                <div class="relative search-box-v4">
                    <input type="text" id="searchInput" placeholder="Cari video atau topik pembahasan..." 
                        class="w-full bg-white/5 border border-white/10 focus:border-red-500/60 rounded-full py-2.5 pl-5 pr-12 text-sm text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-red-500/20 backdrop-blur-md transition-all duration-300">
                    <button id="searchBtn" onclick="handleSearch()" class="absolute right-1.5 top-1/2 -translate-y-1/2 w-8 h-8 rounded-full bg-red-600/80 hover:bg-red-600 text-white flex items-center justify-center transition-all shadow-[0_0_10px_rgba(255,0,60,0.4)]">
                        <i class="fas fa-search text-xs"></i>
                    </button>
                </div>
            </div>

            <!-- Right Actions & Navigation Buttons -->
            <div class="flex items-center gap-2">
                <!-- Mobile Search Trigger Button -->
                <button onclick="toggleMobileSearch()" class="sm:hidden w-9 h-9 rounded-full bg-white/5 border border-white/10 text-gray-300 hover:text-white flex items-center justify-center">
                    <i class="fas fa-search text-sm"></i>
                </button>

                <!-- Menu Tombol Informasi Sejarah -->
                <button onclick="showSejarahIndonesiaModal()" class="hidden lg:flex items-center gap-2 bg-white/5 hover:bg-red-600/20 border border-white/10 hover:border-red-500/40 px-3 py-1.5 rounded-lg text-xs font-semibold text-gray-200 transition-all">
                    <i class="fas fa-landmark text-red-500"></i>
                    <span>Sejarah Indonesia</span>
                </button>

                <button onclick="showSejarahMiniTubeModal()" class="hidden lg:flex items-center gap-2 bg-white/5 hover:bg-red-600/20 border border-white/10 hover:border-red-500/40 px-3 py-1.5 rounded-lg text-xs font-semibold text-gray-200 transition-all">
                    <i class="fas fa-history text-red-500"></i>
                    <span>Sejarah MiniTube</span>
                </button>

                <!-- Indicator Status -->
                <div class="flex items-center gap-2 bg-gradient-to-r from-red-950/40 to-black/40 border border-red-500/30 rounded-full px-3 py-1.5 shadow-[0_0_10px_rgba(255,0,60,0.2)]">
                    <div class="w-2.5 h-2.5 rounded-full bg-red-600 animate-pulse shadow-[0_0_6px_#ff003c]"></div>
                    <span class="text-xs font-bold tracking-wider text-gray-200 font-mono">INDONESIA</span>
                </div>
            </div>

        </div>

        <!-- Mobile Search Expandable Box -->
        <div id="mobileSearchContainer" class="hidden sm:hidden pt-3 pb-1">
            <div class="relative">
                <input type="text" id="mobileSearchInput" placeholder="Cari video..." 
                    class="w-full bg-white/5 border border-red-500/40 rounded-full py-2 pl-4 pr-10 text-sm text-white placeholder-gray-400 focus:outline-none">
                <button onclick="handleMobileSearch()" class="absolute right-3 top-1/2 -translate-y-1/2 text-red-500">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Running Info Ticker -->
    <section class="bg-gradient-to-r from-red-950/60 via-red-900/20 to-red-950/60 border-b border-red-500/20 py-2 px-4 text-xs">
        <div class="max-w-7xl mx-auto flex items-center justify-between gap-4">
            <div class="flex items-center gap-2 overflow-hidden">
                <span class="bg-gradient-to-r from-red-600 to-red-500 text-white font-bold text-[10px] px-2 py-0.5 rounded uppercase tracking-wider shrink-0">
                    PEMBERITAHUAN
                </span>
                <p class="truncate text-red-100/80 font-medium">
                    Selamat Datang di MiniTube X V4.1 — Platform Digital Media Berkemampuan PWA dan Bebas Iklan.
                </p>
            </div>
            <span class="hidden md:block font-mono text-[10px] text-red-400/80 shrink-0 uppercase">
                STATUS SISTEM: <span class="text-emerald-400 font-bold">AKTIF</span>
            </span>
        </div>
    </section>

    <!-- Main Workspace -->
    <main class="max-w-7xl mx-auto px-4 lg:px-8 py-6 relative z-10">

        <!-- Main Video Embed Player & Details Container -->
        <div id="mainPlayerContainer" class="hidden mb-8 transition-all duration-500">
            <div class="relative w-full aspect-video rounded-2xl overflow-hidden bg-black border border-red-500/30 shadow-[0_0_30px_rgba(255,0,60,0.25)]">
                <iframe id="mainYoutubePlayer" class="w-full h-full" src="" title="YouTube Video Player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
            
            <!-- Video Info Panel -->
            <div class="mt-4 p-4 lg:p-6 rounded-2xl bg-white/[0.03] border border-white/10 backdrop-blur-xl flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <div>
                    <h2 id="playerVideoTitle" class="text-base lg:text-lg font-bold text-white line-clamp-2">Judul Video Utama</h2>
                    <p id="playerChannelTitle" class="text-xs text-red-400 mt-1 font-semibold flex items-center gap-1">
                        <i class="fas fa-check-circle text-[10px]"></i> <span id="channelNameText">Nama Channel</span>
                    </p>
                </div>
                
                <!-- Player Controls & Theatre Toggle -->
                <div class="flex items-center gap-3 shrink-0">
                    <button onclick="toggleTheatreMode()" class="px-3.5 py-2 rounded-xl bg-white/5 hover:bg-red-600/20 border border-white/10 hover:border-red-500/40 text-xs font-semibold text-gray-200 flex items-center gap-2 transition-all">
                        <i class="fas fa-expand"></i> Mode Bioskop
                    </button>
                    <button onclick="closePlayer()" class="px-3.5 py-2 rounded-xl bg-red-600/80 hover:bg-red-600 text-xs font-semibold text-white flex items-center gap-2 shadow-[0_0_12px_rgba(255,0,60,0.4)] transition-all">
                        <i class="fas fa-times"></i> Tutup
                    </button>
                </div>
            </div>
        </div>

        <!-- Horizontal Category Chips -->
        <div class="flex items-center gap-2.5 overflow-x-auto pb-4 pt-1 no-scrollbar">
            <button onclick="filterCategory('All')" class="category-chip px-4 py-2 rounded-xl bg-gradient-to-r from-red-600 to-red-500 text-white text-xs font-bold shadow-[0_0_12px_rgba(255,0,60,0.5)] border border-red-400 shrink-0">
                Semua Video
            </button>
            <button onclick="filterCategory('Sejarah Indonesia')" class="category-chip px-4 py-2 rounded-xl bg-white/5 hover:bg-red-600/20 text-gray-300 hover:text-white text-xs font-semibold border border-white/10 hover:border-red-500/40 shrink-0 transition-all flex items-center gap-2">
                <i class="fas fa-monument text-red-500"></i> Sejarah Indonesia
            </button>
            <button onclick="filterCategory('Trending')" class="category-chip px-4 py-2 rounded-xl bg-white/5 hover:bg-red-600/20 text-gray-300 hover:text-white text-xs font-semibold border border-white/10 hover:border-red-500/40 shrink-0 transition-all">
                Trending Nasional
            </button>
            <button onclick="filterCategory('Edukasi')" class="category-chip px-4 py-2 rounded-xl bg-white/5 hover:bg-red-600/20 text-gray-300 hover:text-white text-xs font-semibold border border-white/10 hover:border-red-500/40 shrink-0 transition-all">
                Edukasi & Kebudayaan
            </button>
            <button onclick="filterCategory('Musik')" class="category-chip px-4 py-2 rounded-xl bg-white/5 hover:bg-red-600/20 text-gray-300 hover:text-white text-xs font-semibold border border-white/10 hover:border-red-500/40 shrink-0 transition-all">
                Musik Nusantara
            </button>
            <button onclick="filterCategory('Gaming')" class="category-chip px-4 py-2 rounded-xl bg-white/5 hover:bg-red-600/20 text-gray-300 hover:text-white text-xs font-semibold border border-white/10 hover:border-red-500/40 shrink-0 transition-all">
                Komunitas Gaming
            </button>
        </div>

        <!-- Skeleton Loading State -->
        <div id="skeletonLoaderGrid" class="hidden grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 mt-4">
            <div class="skeleton-card rounded-2xl p-3 bg-white/5 border border-white/5 space-y-3">
                <div class="w-full aspect-video rounded-xl skeleton-box"></div>
                <div class="h-4 w-3/4 rounded skeleton-box"></div>
                <div class="h-3 w-1/2 rounded skeleton-box"></div>
            </div>
            <div class="skeleton-card rounded-2xl p-3 bg-white/5 border border-white/5 space-y-3">
                <div class="w-full aspect-video rounded-xl skeleton-box"></div>
                <div class="h-4 w-3/4 rounded skeleton-box"></div>
                <div class="h-3 w-1/2 rounded skeleton-box"></div>
            </div>
            <div class="skeleton-card rounded-2xl p-3 bg-white/5 border border-white/5 space-y-3">
                <div class="w-full aspect-video rounded-xl skeleton-box"></div>
                <div class="h-4 w-3/4 rounded skeleton-box"></div>
                <div class="h-3 w-1/2 rounded skeleton-box"></div>
            </div>
            <div class="skeleton-card rounded-2xl p-3 bg-white/5 border border-white/5 space-y-3">
                <div class="w-full aspect-video rounded-xl skeleton-box"></div>
                <div class="h-4 w-3/4 rounded skeleton-box"></div>
                <div class="h-3 w-1/2 rounded skeleton-box"></div>
            </div>
        </div>

        <!-- Video Feed Responsive Grid -->
        <div id="video-feed-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 mt-4">
            <!-- Dynamic Video Cards appended via script.js -->
        </div>

    </main>

    <!-- Floating Action Buttons (Back-To-Top) -->
    <button id="btn-back-to-top" onclick="scrollToTop()" aria-label="Kembali ke Atas">
        <i class="fas fa-arrow-up"></i>
    </button>

    <!-- Permanent Watermark Edisi Nusantara -->
    <footer class="fixed bottom-2 left-3 text-[10px] font-mono text-gray-500/80 pointer-events-none z-50 flex items-center gap-2">
        <span class="inline-block w-2 h-2 rounded-full bg-red-600 shadow-[0_0_8px_#ff003c]"></span>
        <span>MINITUBE-X // EDISI NUSANTARA MERAH PUTIH v4.1</span>
    </footer>

    <!-- Firebase SDK & Dependencies -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Fungsi Modal Sejarah (Formal & Profesional) -->
    <script>
        function showSejarahIndonesiaModal() {
            Swal.fire({
                title: 'Sejarah Singkat Republik Indonesia',
                html: `
                    <div class="text-left text-xs leading-relaxed text-gray-300 space-y-3 font-sans">
                        <p><strong>Periode Kerajaan & Nusantara:</strong> Peradaban Nusantara dibangun oleh kerajaan-kerajaan besar seperti Sriwijaya dan Majapahit yang menjadi pusat perdagangan serta kebudayaan Asia Tenggara.</p>
                        <p><strong>Masa Perjuangan & Pergerakan:</strong> Perjuangan meraih kemerdekaan menguat melalui pergerakan nasional yang ditandai oleh Sumpah Pemuda pada tahun 1928 sebagai simbol persatuan bangsa.</p>
                        <p><strong>Proklamasi Kemerdekaan:</strong> Pada tanggal 17 Agustus 1945, Soekarno dan Mohammad Hatta memproklamasikan kemerdekaan Indonesia, melahirkan negara berdaulat berlandaskan Pancasila dan UUD 1945.</p>
                    </div>
                `,
                icon: 'info',
                confirmButtonText: 'Tutup',
                confirmButtonColor: '#ff003c',
                background: '#0d0607',
                color: '#ffffff'
            });
        }

        function showSejarahMiniTubeModal() {
            Swal.fire({
                title: 'Sejarah Pengembangan MiniTube X',
                html: `
                    <div class="text-left text-xs leading-relaxed text-gray-300 space-y-3 font-sans">
                        <p><strong>Pengembangan Awal (v1.0 - v3.0):</strong> MiniTube dirancang sebagai platform pemutar media berbasis web yang berfokus pada kecepatan, efisiensi bandwidth, dan antarmuka tanpa gangguan iklan.</p>
                        <p><strong>Evolusi Versi 4.0:</strong> Integrasi arsitektur PWA (Progressive Web App) dan penyelarasan basis data Firebase Real-time untuk menjamin ketahanan sistem saat diakses dalam berbagai kondisi jaringan.</p>
                        <p><strong>Versi 4.1 Edisi Nusantara:</strong> Pembaruan visual menyeluruh bertema Merah Putih dengan standar estetika glassmorphism modern, dioptimalkan khusus untuk kenyamanan pengguna Indonesia.</p>
                    </div>
                `,
                icon: 'info',
                confirmButtonText: 'Tutup',
                confirmButtonColor: '#ff003c',
                background: '#0d0607',
                color: '#ffffff'
            });
        }
    </script>

    <!-- App Engine Script -->
    <script src="script.js"></script>

</body>
</html>
