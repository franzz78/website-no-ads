<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MiniTube Mobile</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="mobile-header">
        <div class="header-left">
            <i class="fab fa-youtube youtube-logo-icon"></i>
            <span class="logo-text">YouTube</span>
        </div>
        <div class="header-right">
            <div class="notification-container">
                <i class="far fa-bell header-icon"></i>
                <span class="notification-badge">9+</span>
            </div>
            <i class="fas fa-search header-icon" id="mobile-search-trigger"></i>
        </div>
    </header>

    <div class="mobile-search-bar-container">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="Telusuri Video MiniTube...">
            <button class="search-btn"><i class="fas fa-search"></i></button>
        </div>
    </div>

    <div class="mobile-tags-bar">
        <div class="tag explorer-tag"><i class="fas fa-compass"></i></div>
        <span class="tag active">All</span>
        <span class="tag">Gaming</span>
        <span class="tag">Role-playing</span>
        <span class="tag">Live</span>
        <span class="tag">Life Simulation Games</span>
    </div>

    <main class="mobile-content">
        
        <div class="player-container">
            <div class="video-wrapper">
                <iframe id="main-youtube-player" 
                        src="https://www.youtube.com/embed/jfKfPfyJRdk?rel=0&autoplay=0&modestbranding=1&enablejsapi=1" 
                        title="YouTube video player" 
                        frameborder="0" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                        allowfullscreen>
                </iframe>
            </div>
            <h3 id="playing-title" class="player-title">MiniTube Pemutar Bebas Iklan Komersial</h3>
            <p id="playing-channel" class="player-channel">Klik video atau Shorts di bawah untuk memutar</p>
        </div>

        <hr class="section-divider">

        <div class="shorts-section">
            <div class="shorts-header">
                <div class="shorts-title-left">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/f/fc/Youtube_shorts_icon.svg" alt="Shorts" class="shorts-logo">
                    <span>Shorts</span>
                </div>
                <i class="fas fa-ellipsis-v shorts-more"></i>
            </div>

            <div class="shorts-grid">
                <div class="shorts-card" onclick="playVideo('rX96Ym8bBEY', '14 MILIAR BUNGKUS?! 5 Negara Paling Gila Makan Mie Instan...', 'Shorts Kuliner')">
                    <div class="shorts-thumbnail-wrapper">
                        <img src="https://img.youtube.com/vi/rX96Ym8bBEY/hqdefault.jpg" alt="Shorts 1">
                    </div>
                    <div class="shorts-info">
                        <p class="shorts-text">"14 MILIAR BUNGKUS?!" 5 Negara Paling Gila Makan Mie Instan...</p>
                    </div>
                </div>
                <div class="shorts-card" onclick="playVideo('pS9fP8pG7wE', 'Di Amerika, Nasi Goreng Aja Dijual Frozen! 😳', 'Shorts Kuliner')">
                    <div class="shorts-thumbnail-wrapper">
                        <img src="https://img.youtube.com/vi/pS9fP8pG7wE/hqdefault.jpg" alt="Shorts 2">
                    </div>
                    <div class="shorts-info">
                        <p class="shorts-text">Di Amerika, Nasi Goreng Aja Dijual Frozen! 😳</p>
                    </div>
                </div>
            </div>
        </div>

        <hr class="section-divider">

        <div class="video-grid">
            </div>

    </main>

    <nav class="bottom-nav">
        <div class="nav-item active" onclick="location.reload()">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </div>
        <div class="nav-item">
            <img src="https://upload.wikimedia.org/wikipedia/commons/f/fc/Youtube_shorts_icon.svg" style="width:18px; filter: invert(1);" alt="Shorts">
            <span>Shorts</span>
        </div>
        <div class="nav-item add-button">
            <i class="fas fa-plus"></i>
        </div>
        <div class="nav-item">
            <i class="layer-group fas fa-folder-open"></i>
            <span>Subscriptions</span>
        </div>
        <div class="nav-item profile-nav">
            <i class="far fa-user-circle" style="font-size: 20px;"></i>
            <span>You</span>
        </div>
    </nav>

    <script>
        function playVideo(videoId, title, channel) {
            const player = document.getElementById('main-youtube-player');
            // Menambahkan parameter enablejsapi=1 agar browser mengenali perintah PiP
            player.src = `https://www.youtube.com/embed/${videoId}?rel=0&autoplay=1&modestbranding=1&enablejsapi=1`;
            
            document.getElementById('playing-title').innerText = title;
            document.getElementById('playing-channel').innerText = channel;
            
            window.scrollTo({ top: 0, behavior: 'smooth' });

            // Otomatis request Picture-in-Picture setelah video dimuat (agar musik tetap nyala saat keluar aplikasi)
            setTimeout(() => {
                if (document.pictureInPictureEnabled) {
                    player.requestPictureInPicture().catch(err => {
                        console.log("Tekan video secara manual untuk mengaktifkan pemutaran latar belakang.");
                    });
                }
            }, 1500);
        }

        // Efek toggle kolom pencarian
        const searchTrigger = document.getElementById('mobile-search-trigger');
        const searchContainer = document.querySelector('.mobile-search-bar-container');
        if(searchTrigger) {
            searchTrigger.addEventListener('click', () => {
                searchContainer.classList.toggle('active');
            });
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
