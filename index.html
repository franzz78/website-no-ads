<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MiniTube X V4.1 - Ultra Fast Instant</title>

    <!-- SEO & Meta Tags -->
    <meta name="description" content="MiniTube X V4.1 - Platform Streaming Video Modern, Bebas Iklan, dan Super Cepat.">
    <meta name="theme-color" content="#ff003c">
    <meta name="google-site-verification" content="9FgPszYe0eP2kBEzJ0wdNVbPASR5mDb1S51DApXHbkc" />

    <!-- Favicon & PWA Icons -->
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/about-blank/assets/main/logo.png">
    <link rel="manifest" href="manifest.json">

    <!-- Fonts & FontAwesome Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            red: '#ff003c',
                            crimson: '#d6002f',
                            gold: '#ffd700',
                            dark: '#0d0607',
                            card: 'rgba(255, 255, 255, 0.04)'
                        }
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0d0607] text-white min-h-screen font-sans antialiased selection:bg-[#ff003c] selection:text-white relative overflow-x-hidden pb-28 lg:pb-12">

    <!-- ==================== 1. LOADING SCREEN INSTAN ==================== -->
    <div id="app-loading-screen" class="fixed inset-0 z-[10000] bg-[#0d0607] flex flex-col items-center justify-center transition-opacity duration-200">
        <div class="relative flex items-center justify-center mb-4">
            <div class="w-16 h-16 rounded-2xl bg-gradient-to-tr from-red-600 to-red-500 flex items-center justify-center shadow-[0_0_30px_rgba(255,0,60,0.8)] border border-red-400/40 animate-pulse">
                <i class="fas fa-play text-white text-xl"></i>
            </div>
        </div>
        <h2 class="text-lg font-extrabold tracking-wider text-white">MINITUBE <span class="text-[#ff003c]">X</span></h2>
        <p class="text-[10px] tracking-[0.2em] text-red-400 font-mono mt-1 font-semibold uppercase">INSTANT MODE v4.1</p>
    </div>

    <!-- Ambient Glow Background -->
    <div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
        <div class="absolute -top-40 -left-40 w-96 h-96 bg-red-600/15 rounded-full blur-[120px]"></div>
        <div class="absolute top-1/2 right-0 w-80 h-80 bg-white/5 rounded-full blur-[100px]"></div>
    </div>

    <!-- ==================== HEADER BAR ==================== -->
    <header class="sticky top-0 z-50 backdrop-blur-xl bg-[#0d0607]/95 border-b border-red-500/20 px-4 lg:px-8 py-3">
        <div class="max-w-7xl mx-auto flex items-center justify-between gap-4">
            
            <div class="flex items-center gap-3 cursor-pointer" onclick="location.reload()">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-red-600 to-red-500 flex items-center justify-center shadow-[0_0_18px_rgba(255,0,60,0.4)] border border-red-400/30">
                    <i class="fas fa-play text-white text-sm"></i>
                </div>
                <div>
                    <h1 class="text-lg font-extrabold tracking-wider text-white flex items-center gap-1.5 leading-none">
                        MINITUBE <span class="text-[#ff003c]">X</span>
                    </h1>
                    <span class="text-[9px] tracking-[0.2em] text-red-400/90 font-mono block mt-1 font-bold">EDISI NUSANTARA v4.1</span>
                </div>
            </div>

            <div class="hidden md:flex items-center gap-3">
                <button onclick="showSejarahIndonesiaModal()" class="flex items-center gap-2 bg-white/5 hover:bg-red-600/20 border border-white/10 hover:border-red-500/40 px-3.5 py-1.5 rounded-lg text-xs font-semibold text-gray-200 transition-all">
                    <i class="fas fa-landmark text-red-500"></i>
                    <span>Sejarah ID</span>
                </button>
                <button onclick="showSejarahMiniTubeModal()" class="flex items-center gap-2 bg-white/5 hover:bg-red-600/20 border border-white/10 hover:border-red-500/40 px-3.5 py-1.5 rounded-lg text-xs font-semibold text-gray-200 transition-all">
                    <i class="fas fa-history text-red-500"></i>
                    <span>Sejarah Web</span>
                </button>
            </div>

        </div>
    </header>

    <!-- Main Workspace -->
    <main class="max-w-7xl mx-auto px-4 lg:px-8 py-6 relative z-10">

        <!-- ==================== SEARCH BAR INSTANT (0 DETIK) ==================== -->
        <div class="max-w-2xl mx-auto mb-8 relative">
            <form id="searchForm" onsubmit="event.preventDefault(); executeInstantSearch();" class="relative z-20">
                <div class="relative flex items-center">
                    <input type="text" id="searchInput" 
                        placeholder="Cari lagu / video (Ketik & Tekan Enter)..." 
                        autocomplete="off"
                        oninput="executeInstantSearch()"
                        class="w-full bg-[#140b0d] border-2 border-red-500/40 focus:border-red-500 rounded-2xl py-3.5 pl-12 pr-14 text-sm text-white placeholder-gray-400 focus:outline-none focus:ring-4 focus:ring-red-500/20 shadow-[0_0_20px_rgba(255,0,60,0.15)] transition-all">
                    
                    <i class="fas fa-search absolute left-4 text-red-500 text-base pointer-events-none"></i>
                    
                    <button type="submit" id="searchBtn" class="absolute right-2 w-10 h-10 rounded-xl bg-gradient-to-r from-red-600 to-red-500 text-white flex items-center justify-center shadow-[0_0_12px_rgba(255,0,60,0.5)] active:scale-95 transition-all">
                        <i class="fas fa-bolt text-sm"></i>
                    </button>
                </div>
            </form>
        </div>

        <!-- Main Video Embed Player Container -->
        <div id="mainPlayerContainer" class="hidden mb-8 transition-all duration-300">
            <div class="relative w-full aspect-video rounded-2xl overflow-hidden bg-black border border-red-500/30 shadow-[0_0_30px_rgba(255,0,60,0.25)]">
                <iframe id="mainYoutubePlayer" class="w-full h-full" src="" title="YouTube Video Player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
            
            <div class="mt-4 p-4 lg:p-6 rounded-2xl bg-white/[0.03] border border-white/10 backdrop-blur-xl flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <div>
                    <h2 id="playerVideoTitle" class="text-base lg:text-lg font-bold text-white line-clamp-2">Judul Video</h2>
                    <p id="playerChannelTitle" class="text-xs text-red-400 mt-1 font-semibold flex items-center gap-1">
                        <i class="fas fa-check-circle text-[10px]"></i> <span id="channelNameText">MiniTube Player</span>
                    </p>
                </div>
                
                <div class="flex items-center gap-3 shrink-0">
                    <button onclick="closePlayer()" class="px-3.5 py-2 rounded-xl bg-red-600 hover:bg-red-500 text-xs font-semibold text-white flex items-center gap-2 shadow-[0_0_12px_rgba(255,0,60,0.4)] transition-all">
                        <i class="fas fa-times"></i> Tutup
                    </button>
                </div>
            </div>
        </div>

        <!-- Video Feed Grid -->
        <div id="video-feed-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6 mt-4">
            <!-- Video Cards otomatis di-render dari script.js -->
        </div>

    </main>

    <!-- ==================== MAIN MENU BOTTOM BAR ==================== -->
    <nav class="fixed bottom-0 left-0 right-0 z-[9999] bg-[#0d0607]/95 backdrop-blur-2xl border-t border-red-500/30 py-3 px-4 shadow-[0_-5px_25px_rgba(0,0,0,0.9)]">
        <div class="flex items-center justify-around max-w-lg mx-auto">
            <button onclick="location.reload()" class="flex flex-col items-center gap-1 text-red-500 font-bold transition-transform active:scale-95">
                <i class="fas fa-home text-lg"></i>
                <span class="text-[10px] tracking-wide">Beranda</span>
            </button>

            <button onclick="showSejarahIndonesiaModal()" class="flex flex-col items-center gap-1 text-gray-300 hover:text-red-400 font-medium transition-transform active:scale-95">
                <i class="fas fa-landmark text-lg"></i>
                <span class="text-[10px] tracking-wide">Sejarah ID</span>
            </button>

            <button onclick="showSejarahMiniTubeModal()" class="flex flex-col items-center gap-1 text-gray-300 hover:text-red-400 font-medium transition-transform active:scale-95">
                <i class="fas fa-history text-lg"></i>
                <span class="text-[10px] tracking-wide">Sejarah Web</span>
            </button>

            <button onclick="window.scrollTo({top:0, behavior:'smooth'})" class="flex flex-col items-center gap-1 text-gray-300 hover:text-red-400 font-medium transition-transform active:scale-95">
                <i class="fas fa-arrow-up text-lg"></i>
                <span class="text-[10px] tracking-wide">Ke Atas</span>
            </button>
        </div>
    </nav>

    <!-- External Libs -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script>
        // Splash Screen Langsung Hilang
        window.addEventListener('load', () => {
            const loader = document.getElementById('app-loading-screen');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 200);
            }
        });

        // ==================== EKSEKUSI PENCARIAN INSTAN LOKAL ====================
        function executeInstantSearch() {
            const query = document.getElementById('searchInput').value.trim();

            // Panggil fungsi pencarian bawaan script.js tanpa delay
            if (typeof handleSearch === 'function') {
                handleSearch();
            } else if (typeof renderVideos === 'function') {
                renderVideos(query);
            } else if (typeof filterVideos === 'function') {
                filterVideos(query);
            } else {
                const event = new CustomEvent('searchQuery', { detail: query });
                window.dispatchEvent(event);
            }
        }

        // Fungsi Putar Video Langsung Tanpa Delay
        function playYoutubeVideo(id, title, channel) {
            const container = document.getElementById('mainPlayerContainer');
            const iframe = document.getElementById('mainYoutubePlayer');
            const titleEl = document.getElementById('playerVideoTitle');
            const channelEl = document.getElementById('channelNameText');

            if (iframe) {
                iframe.src = `https://www.youtube.com/embed/${id}?autoplay=1&enablejsapi=1`;
            }
            if (titleEl) titleEl.innerText = title || 'YouTube Video';
            if (channelEl) channelEl.innerText = channel || 'Channel';

            if (container) {
                container.classList.remove('hidden');
                window.scrollTo({ top: container.offsetTop - 80, behavior: 'smooth' });
            }
        }

        function closePlayer() {
            const container = document.getElementById('mainPlayerContainer');
            const iframe = document.getElementById('mainYoutubePlayer');
            if (iframe) iframe.src = '';
            if (container) container.classList.add('hidden');
        }

        function showSejarahIndonesiaModal() {
            Swal.fire({
                title: 'Sejarah Singkat RI',
                text: 'Proklamasi Kemerdekaan Indonesia dilaksanakan pada 17 Agustus 1945 oleh Soekarno-Hatta.',
                icon: 'info',
                confirmButtonColor: '#ff003c',
                background: '#0d0607', color: '#ffffff'
            });
        }

        function showSejarahMiniTubeModal() {
            Swal.fire({
                title: 'MiniTube X v4.1',
                text: 'Platform pemutar media ringan, bebas iklan, dan cepat berbasis PWA.',
                icon: 'info',
                confirmButtonColor: '#ff003c',
                background: '#0d0607', color: '#ffffff'
            });
        }
    </script>

    <!-- Engine Script Utama -->
    <script src="script.js"></script>
</body>
</html>
